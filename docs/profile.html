<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — r8</title>
  <meta name="description" content="Your r8 profile — manage your reviews, reputation, and account.">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232C4D3F'/><text x='50' y='65' font-family='Georgia, serif' font-size='50' font-weight='bold' fill='white' text-anchor='middle'>8</text></svg>">
</head>
<body>

  <header class="site-header">
    <div class="container" style="display:flex;align-items:center;justify-content:space-between">
      <a href="index.html" class="logo">r<span>8</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Explore</a></li>
        <li><a href="moderation.html">Transparency</a></li>
      </ul>
      <div class="nav-auth" id="navAuth">
        <a href="profile.html" class="btn btn-primary btn-sm">Sign In</a>
      </div>
    </div>
  </header>

  <div class="container">

    <!-- Auth Panel (shown when not signed in) -->
    <div id="authView">
      <div class="auth-panel">
        <h2>Welcome to r8</h2>
        <p class="subtitle">Sign in to rate experiences and build your reputation.</p>

        <div class="auth-tabs">
          <div class="auth-tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</div>
          <div class="auth-tab" id="tabSignUp" onclick="switchTab('signup')">Sign Up</div>
          <div class="auth-tab" id="tabErmn" onclick="switchTab('ermn')">Ermn Sign In</div>
        </div>

        <!-- Sign In -->
        <div id="signinForm">
          <div class="form-group">
            <label>Username or Email</label>
            <input class="form-input" type="text" id="siEmail" placeholder="Username or email">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input class="form-input" type="password" id="siPassword" placeholder="Your password">
          </div>
          <button class="btn btn-primary" style="width:100%" onclick="doSignIn()" id="siBtn">Sign In</button>
        </div>

        <!-- Sign Up -->
        <div id="signupForm" style="display:none">
          <div class="form-group">
            <label>Username</label>
            <input class="form-input" id="suUsername" placeholder="Pick a username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input class="form-input" type="password" id="suPassword" placeholder="At least 6 characters">
          </div>
          <button class="btn btn-primary" style="width:100%" onclick="doSignUp()" id="suBtn">Create Account</button>
        </div>

        <!-- Ermn Sign In -->
        <div id="ermnForm" style="display:none">
          <div class="form-group">
            <label>Ermn Username</label>
            <input class="form-input" id="ermnUsername" placeholder="Your ermn username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input class="form-input" type="password" id="ermnPassword" placeholder="Your ermn password">
          </div>
          <button class="btn btn-primary" style="width:100%;background:#3b5998;border-color:#3b5998" onclick="doErmnSignIn()" id="ermnBtn">Sign In with Ermn</button>
        </div>
      </div>
    </div>

    <!-- Profile View (shown when signed in) -->
    <div id="profileView" style="display:none;padding-top:40px">

      <!-- Profile Header -->
      <div class="profile-header" id="profileHeader"></div>

      <!-- Stats -->
      <div class="stats-row" id="profileStats"></div>

      <!-- Tabs -->
      <div style="display:flex;gap:0;border-bottom:1px solid var(--glass-border);margin-bottom:24px">
        <button class="auth-tab active" id="ptReviews" onclick="profileTab('reviews')">My Reviews</button>
        <button class="auth-tab" id="ptSettings" onclick="profileTab('settings')">Settings</button>
      </div>

      <!-- My Reviews -->
      <div id="myReviewsSection">
        <div id="myReviews"></div>
        <div class="empty-state" id="myReviewsEmpty" style="display:none">
          <div class="icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
          </div>
          <p>You haven't written any reviews yet.</p>
          <a href="index.html" class="btn btn-primary btn-sm" style="margin-top:12px">Explore Entities</a>
        </div>
      </div>

      <!-- Settings -->
      <div id="settingsSection" style="display:none">
        <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:var(--radius);padding:28px;max-width:500px">
          <h3 style="font-size:17px;margin-bottom:20px">Edit Profile</h3>
          <div class="form-group">
            <label>Avatar URL</label>
            <input class="form-input" id="editAvatarUrl" placeholder="Link to your avatar image...">
          </div>
          <div class="form-group">
            <label>Bio</label>
            <textarea class="form-textarea" id="editBio" placeholder="Tell us about yourself..."></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveBio()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 r8</p>
      <div class="powered-by">powered by <span class="ermn">ermn.</span></div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      R8.onAuthChange(() => {
        checkState();
      });
    });

    function checkState() {
      const user = R8.getUser();
      if (user === undefined) return; // Still loading session
      if (user) {
        showProfile(user);
      } else {
        document.getElementById('authView').style.display = 'block';
        document.getElementById('profileView').style.display = 'none';
      }
    }

    function switchTab(tab) {
      document.getElementById('tabSignIn').classList.toggle('active', tab === 'signin');
      document.getElementById('tabSignUp').classList.toggle('active', tab === 'signup');
      document.getElementById('tabErmn').classList.toggle('active', tab === 'ermn');
      document.getElementById('signinForm').style.display = tab === 'signin' ? 'block' : 'none';
      document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
      document.getElementById('ermnForm').style.display = tab === 'ermn' ? 'block' : 'none';
    }

    async function doSignIn() {
      const input = document.getElementById('siEmail').value.trim();
      const pw = document.getElementById('siPassword').value;
      if (!input || !pw) { R8.toast('Fill in all fields.', 'error'); return; }
      
      const email = input.includes('@') ? input : (input.toLowerCase() + '@r8.social');
      
      document.getElementById('siBtn').disabled = true;
      try {
        await R8.signIn(email, pw);
        setTimeout(checkState, 500);
      } catch (e) { R8.toast(e.message, 'error'); }
      document.getElementById('siBtn').disabled = false;
    }

    async function doSignUp() {
      const username = document.getElementById('suUsername').value.trim();
      const pw = document.getElementById('suPassword').value;
      if (!username || !pw) { R8.toast('Fill in all fields.', 'error'); return; }
      if (username.length < 3) { R8.toast('Username must be at least 3 characters.', 'error'); return; }
      if (pw.length < 6) { R8.toast('Password must be at least 6 characters.', 'error'); return; }
      
      const email = username.toLowerCase() + '@r8.social';
      
      document.getElementById('suBtn').disabled = true;
      try {
        await R8.signUp(username, email, pw);
        setTimeout(checkState, 500);
      } catch (e) { R8.toast(e.message, 'error'); }
      document.getElementById('suBtn').disabled = false;
    }

    async function doErmnSignIn() {
      const username = document.getElementById('ermnUsername').value.trim();
      const pw = document.getElementById('ermnPassword').value;
      if (!username || !pw) { R8.toast('Fill in all fields.', 'error'); return; }
      
      document.getElementById('ermnBtn').disabled = true;
      try {
        await R8.signInWithErmn(username, pw);
        setTimeout(checkState, 500);
      } catch (e) { R8.toast(e.message, 'error'); }
      document.getElementById('ermnBtn').disabled = false;
    }

    async function showProfile(user) {
      document.getElementById('authView').style.display = 'none';
      document.getElementById('profileView').style.display = 'block';
      const p = user.profile || {};
      const joinDate = new Date(p.created_at || user.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

      const avatarHtml = p.avatar_url 
        ? `<img src="${esc(p.avatar_url)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`
        : (p.username || '?')[0].toUpperCase();

      document.getElementById('profileHeader').innerHTML = `
        <div class="profile-avatar">${avatarHtml}</div>
        <div class="profile-info">
          <h2>${esc(p.username || 'User')}</h2>
          <div class="trust">Trust Score: ${Math.round(p.trust_score || 50)}</div>
          <div class="joined">Joined ${joinDate}</div>
          ${p.bio ? `<p style="font-size:14px;color:var(--text-dim);margin-top:8px">${esc(p.bio)}</p>` : ''}
        </div>
      `;
      document.getElementById('editBio').value = p.bio || '';
      document.getElementById('editAvatarUrl').value = p.avatar_url || '';
      loadMyReviews(user);
    }

    async function loadMyReviews(user) {
      try {
        const reviews = await R8.getUserReviews(user.id);
        const container = document.getElementById('myReviews');
        document.getElementById('profileStats').innerHTML = `
          <div class="stat-card"><div class="stat-value">${reviews.length}</div><div class="stat-label">Reviews</div></div>
          <div class="stat-card"><div class="stat-value">${Math.round(user.profile?.trust_score || 50)}</div><div class="stat-label">Trust Score</div></div>
          <div class="stat-card"><div class="stat-value">${reviews.filter(r => r.status === 'active').length}</div><div class="stat-label">Active</div></div>
        `;
        if (!reviews.length) {
          container.innerHTML = '';
          document.getElementById('myReviewsEmpty').style.display = 'block';
          return;
        }
        document.getElementById('myReviewsEmpty').style.display = 'none';
        container.innerHTML = reviews.map(r => `
          <div class="review">
            <div class="review-header">
              <div>
                <strong style="font-size:15px">${esc(r.entities?.title || 'Unknown Entity')}</strong>
                <div style="font-size:12px;color:var(--text-muted)">${esc(r.entities?.category || '')} · ${R8.timeAgo(r.created_at)}</div>
              </div>
              <div class="review-score" style="color:${R8.scoreColor(r.score)}">${r.score}<small style="color:var(--text-muted);font-size:12px">/10</small></div>
            </div>
            <div class="review-interaction">${esc(r.interaction_type)}</div>
            ${r.review_tags?.length ? '<div class="card-tags" style="margin:8px 0">' + r.review_tags.map(t => `<span class="tag">${esc(t.tag)}</span>`).join('') + '</div>' : ''}
            <div class="review-body">${esc(r.content)}</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:8px">Status: ${r.status}</div>
          </div>
        `).join('');
      } catch (e) { console.error(e); }
    }

    function profileTab(tab) {
      document.getElementById('ptReviews').classList.toggle('active', tab === 'reviews');
      document.getElementById('ptSettings').classList.toggle('active', tab === 'settings');
      document.getElementById('myReviewsSection').style.display = tab === 'reviews' ? 'block' : 'none';
      document.getElementById('settingsSection').style.display = tab === 'settings' ? 'block' : 'none';
    }

    async function saveBio() {
      const bio = document.getElementById('editBio').value.trim();
      const avatarUrl = document.getElementById('editAvatarUrl').value.trim();
      const user = R8.getUser();
      if (!user) return;
      try {
        const { error } = await R8.getClient().from('profiles').update({ bio, avatar_url: avatarUrl }).eq('id', user.id);
        if (error) throw error;
        R8.toast('Profile updated!', 'success');
        if (user.profile) {
          user.profile.bio = bio;
          user.profile.avatar_url = avatarUrl;
        }
        showProfile(user);
      } catch (e) { R8.toast(e.message, 'error'); }
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  </script>
</body>
</html>
